name: Security CI

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  supply-chain:
    name: Dependencies, licences, artifacts, and credentials
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out complete history
        uses: actions/checkout@v6
        with:
          clean: true
          fetch-depth: 0
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
          package-manager-cache: false

      - name: Enable pinned pnpm
        run: corepack enable

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependency advisories
        run: pnpm scan:dependencies

      - name: Enforce reviewed dependency licences
        run: pnpm scan:licenses

      - name: Inspect generated-source artifacts
        run: pnpm scan:artifacts

      - name: Install pinned Gitleaks
        shell: bash
        env:
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
          GITLEAKS_VERSION: 8.30.1
        run: |
          archive="$RUNNER_TEMP/gitleaks.tar.gz"
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl --fail --location --proto '=https' --tlsv1.2 "$url" --output "$archive"
          printf '%s  %s\n' "$GITLEAKS_SHA256" "$archive" | sha256sum --check
          tar --extract --gzip --file "$archive" --directory "$RUNNER_TEMP" gitleaks

      - name: Scan complete Git history for credentials
        shell: bash
        run: |
          "$RUNNER_TEMP/gitleaks" git \
            --config .gitleaks.toml \
            --no-banner \
            --redact \
            --report-format sarif \
            --report-path "$RUNNER_TEMP/gitleaks.sarif" \
            --verbose
