name: PR Build

on:
  pull_request:
    branches: ["*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-ci-${{ github.sha }}
          restore-keys: ${{ runner.os }}-turbo-ci-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format and lint
        run: pnpm format-and-lint

      - name: Build
        run: pnpm build

      - name: Type check
        run: pnpm check-types

  e2e-examples:
    name: E2E Examples (${{ matrix.framework }})
    runs-on: ubuntu-latest
    needs: ci
    strategy:
      fail-fast: false
      matrix:
        framework: [react, vue, svelte, solid, preact, qwik, angular]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-e2e-examples-${{ matrix.framework }}-${{ github.sha }}
          restore-keys: ${{ runner.os }}-turbo-e2e-examples-${{ matrix.framework }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: E2E examples (${{ matrix.framework }})
        run: pnpm test:e2e:${{ matrix.framework }}

  e2e-web:
    name: E2E Web
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-e2e-web-${{ github.sha }}
          restore-keys: ${{ runner.os }}-turbo-e2e-web-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: E2E web tests
        run: pnpm test:e2e:web

  tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-tests-${{ github.sha }}
          restore-keys: ${{ runner.os }}-turbo-tests-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: E2E web tests
        run: pnpm test
